name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # La suite fija su propia DATABASE_URL (SQLite) y JWT_SECRET_KEY en
      # tests/conftest.py; estos valores solo cubren imports fuera de pytest
      DATABASE_URL: sqlite:///./ci.db
      JWT_SECRET_KEY: ci-secret-key
      ENVIRONMENT: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests -q
