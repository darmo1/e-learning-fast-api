services:
  db:
    image: postgres:16-alpine
    container_name: elearning-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: elearning
      POSTGRES_PASSWORD: elearning
      POSTGRES_DB: elearning
    ports:
      - "5432:5432"
    volumes:
      - elearning_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elearning -d elearning"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  elearning_pgdata:
